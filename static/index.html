<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Agent - 个人知识库助手</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg: #212121; --bg-sidebar: #171717; --bg-card: #2f2f2f;
  --bg-input: #303030; --bg-hover: #2a2a2a; --bg-thinking: #1a1a2e;
  --text: #e8e8e8; --text-secondary: #9a9a9a; --text-muted: #6b6b6b;
  --accent: #8b5cf6; --accent-dim: #6d42d4; --accent-glow: rgba(139,92,246,.15);
  --border: #3a3a3a; --border-light: #444;
  --green: #10a37f; --red: #ef4444;
  --radius: 12px; --radius-sm: 8px;
  --sidebar-w: 260px;
  --max-chat-w: 820px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); display: flex; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; } ::-webkit-scrollbar-track { background:transparent; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg-sidebar);
  display: flex; flex-direction: column; border-right: 1px solid var(--border);
  transition: transform .25s;
}
.sidebar-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; }
.sidebar-header h2 { font-size: 15px; font-weight: 600; letter-spacing: .3px; }
.new-chat-btn {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
  padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; gap: 6px; width: 100%; margin: 0 16px 12px;
  transition: background .15s;
}
.new-chat-btn:hover { background: var(--bg-hover); }

.sidebar-nav { flex:1; overflow-y:auto; padding: 0 8px; }
.nav-item {
  padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 10px;
  transition: background .12s; margin-bottom: 2px;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--bg-card); color: var(--text); }
.nav-item svg { width:18px; height:18px; flex-shrink:0; }

.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
.sidebar-footer .nav-item { margin:0; }

/* ===== Overlay for upload/knowledge modals ===== */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100;
  display:none; align-items:center; justify-content:center;
}
.overlay.show { display:flex; }
.modal {
  background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius);
  padding: 24px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y:auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.modal h3 { font-size:16px; margin-bottom:16px; }
.modal-close {
  float:right; background:none; border:none; color:var(--text-muted); font-size:20px;
  cursor:pointer; line-height:1;
}
.modal-close:hover { color:var(--text); }

.upload-zone {
  border:2px dashed var(--border); border-radius:var(--radius); padding:40px 20px;
  text-align:center; cursor:pointer; transition:all .2s; margin-bottom:16px;
}
.upload-zone:hover, .upload-zone.dragover { border-color:var(--accent); background:var(--accent-glow); }
.upload-zone .icon { font-size:36px; margin-bottom:8px; }
.upload-zone p { color:var(--text-secondary); font-size:14px; }
.upload-zone .hint { color:var(--text-muted); font-size:12px; margin-top:4px; }

.upload-progress { margin-top:12px; }
.progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }
.progress-text { font-size:12px; color:var(--text-secondary); margin-top:6px; }

.knowledge-content { font-size:13px; line-height:1.8; color:var(--text-secondary); white-space:pre-wrap; }

/* ===== Main ===== */
.main { flex:1; display:flex; flex-direction:column; min-width:0; }

/* Top bar */
.topbar {
  padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); background:var(--bg);
}
.topbar-title { font-size:15px; font-weight:500; }
.topbar-actions { display:flex; gap:8px; }
.topbar-btn {
  background:none; border:1px solid var(--border); color:var(--text-secondary);
  padding:6px 12px; border-radius:var(--radius-sm); cursor:pointer; font-size:12px;
  transition: all .15s;
}
.topbar-btn:hover { background:var(--bg-card); color:var(--text); }

/* Chat area */
.chat-area {
  flex:1; overflow-y:auto; display:flex; flex-direction:column;
  align-items:center; padding: 20px 16px;
}
.chat-area::-webkit-scrollbar { width:8px; }
.chat-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* Welcome */
.welcome {
  text-align:center; margin:auto; padding:40px 20px;
}
.welcome h1 { font-size:28px; font-weight:600; margin-bottom:8px; }
.welcome p { color:var(--text-muted); font-size:15px; margin-bottom:32px; }
.welcome-cards { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.welcome-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 20px; cursor:pointer; text-align:left; width:200px; transition:all .15s;
}
.welcome-card:hover { border-color:var(--accent); background:var(--accent-glow); }
.welcome-card .title { font-size:14px; font-weight:500; margin-bottom:4px; }
.welcome-card .desc { font-size:12px; color:var(--text-muted); }

/* Messages */
.messages { width:100%; max-width:var(--max-chat-w); display:flex; flex-direction:column; gap:0; }
.msg { display:flex; gap:12px; padding:20px 0; animation:fadeIn .3s; }
.msg-user { justify-content:flex-end; }
.msg-user .msg-body { max-width:70%; }
.msg-user .msg-content {
  background:var(--bg-card); border-radius:18px 18px 4px 18px;
  padding:12px 16px; font-size:14px; line-height:1.7;
}

.msg-ai { justify-content:flex-start; }
.msg-ai .msg-body { max-width:100%; flex:1; }
.msg-ai .msg-content { font-size:14px; line-height:1.8; }

/* Thinking block */
.thinking-block {
  margin-bottom:12px; border:1px solid var(--border); border-radius:var(--radius-sm);
  overflow:hidden; background:var(--bg-thinking);
}
.thinking-header {
  padding:10px 14px; display:flex; align-items:center; gap:8px;
  cursor:pointer; font-size:13px; color:var(--text-secondary); user-select:none;
  transition: background .15s;
}
.thinking-header:hover { background:var(--bg-hover); }
.thinking-header .arrow { transition:transform .2s; font-size:11px; }
.thinking-header .arrow.open { transform:rotate(90deg); }
.thinking-spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
.thinking-body { max-height:0; overflow:hidden; transition:max-height .3s ease; }
.thinking-body.open { max-height:600px; overflow-y:auto; }
.think-step {
  padding:8px 14px; border-top:1px solid var(--border); font-size:13px;
  display:flex; gap:8px; align-items:flex-start;
}
.think-step .step-icon { flex-shrink:0; width:20px; text-align:center; }
.think-step .step-info { flex:1; }
.think-step .step-tool { color:var(--accent); font-weight:600; }
.think-step .step-detail { color:var(--text-muted); font-size:12px; margin-top:2px; word-break:break-all; }
.think-step .step-result { color:var(--text-muted); font-size:12px; margin-top:4px; border-left:2px solid var(--border); padding-left:8px; }

/* Answer markdown */
.answer-content { padding:4px 0; }
.answer-content p { margin-bottom:10px; }
.answer-content ul, .answer-content ol { margin:8px 0; padding-left:24px; }
.answer-content li { margin-bottom:4px; }
.answer-content code:not(pre code) {
  background:var(--bg-card); padding:2px 6px; border-radius:4px; font-size:13px;
  font-family: "JetBrains Mono","Fira Code",monospace;
}
.answer-content pre {
  background:#1a1a2e; border-radius:var(--radius-sm); padding:14px 16px;
  overflow-x:auto; margin:12px 0; border:1px solid var(--border);
}
.answer-content pre code { font-size:13px; font-family:"JetBrains Mono","Fira Code",monospace; }
.answer-content blockquote {
  border-left:3px solid var(--accent); padding:8px 16px; margin:10px 0;
  background:var(--accent-glow); border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  color:var(--text-secondary);
}
.answer-content table { border-collapse:collapse; margin:10px 0; width:100%; }
.answer-content th, .answer-content td { border:1px solid var(--border); padding:8px 12px; font-size:13px; text-align:left; }
.answer-content th { background:var(--bg-card); font-weight:600; }
.answer-content strong { color:#fff; }
.answer-content a { color:var(--accent); text-decoration:none; }
.answer-content a:hover { text-decoration:underline; }
.answer-content h1, .answer-content h2, .answer-content h3 { margin:16px 0 8px; font-weight:600; }
.answer-content h1 { font-size:20px; } .answer-content h2 { font-size:17px; } .answer-content h3 { font-size:15px; }

/* Typing cursor */
.typing-cursor::after {
  content:'▋'; color:var(--accent); animation:blink 1s step-end infinite; margin-left:2px;
}
@keyframes blink { 50%{opacity:0} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
@keyframes spin { to{transform:rotate(360deg)} }

/* ===== Input ===== */
.input-area {
  padding:12px 16px 20px; display:flex; justify-content:center;
  background:var(--bg);
}
.input-wrap {
  width:100%; max-width:var(--max-chat-w); background:var(--bg-input);
  border:1px solid var(--border); border-radius:24px; padding:8px 8px 8px 20px;
  display:flex; align-items:flex-end; gap:8px; transition:border-color .2s;
}
.input-wrap:focus-within { border-color:var(--accent); }
.input-wrap textarea {
  flex:1; background:transparent; border:none; outline:none; color:var(--text);
  font-size:14px; line-height:1.6; resize:none; max-height:160px; min-height:24px;
  font-family:inherit; padding:6px 0;
}
.input-wrap textarea::placeholder { color:var(--text-muted); }
.send-btn {
  width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
  background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.send-btn:hover { background:#0e8c6f; }
.send-btn:disabled { background:var(--border); cursor:not-allowed; }
.send-btn svg { width:18px; height:18px; }

/* Responsive */
@media (max-width:768px) {
  .sidebar { position:fixed; z-index:50; height:100%; transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  :root { --sidebar-w:0px; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><h2>📚 Study Agent</h2></div>
  <button class="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新建对话
  </button>
  <nav class="sidebar-nav" id="chatList"></nav>
  <div class="sidebar-footer">
    <div class="nav-item" onclick="showUpload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上传文件
    </div>
    <div class="nav-item" onclick="showKnowledge()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      知识库课本
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="chatTitle">新对话</div>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="toggleSidebar()">☰</button>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <h1>有什么可以帮你的？</h1>
      <p>我可以帮你检索知识库中的学习资料，回答课程相关问题</p>
      <div class="welcome-cards">
        <div class="welcome-card" onclick="quickAsk('操作系统有哪些主要功能？')">
          <div class="title">📖 课程复习</div>
          <div class="desc">操作系统有哪些主要功能？</div>
        </div>
        <div class="welcome-card" onclick="quickAsk('什么是动态规划？举个例子说明')">
          <div class="title">💡 概念解析</div>
          <div class="desc">什么是动态规划？</div>
        </div>
        <div class="welcome-card" onclick="quickAsk('帮我总结进程同步与互斥的要点')">
          <div class="title">📝 知识总结</div>
          <div class="desc">总结进程同步与互斥的要点</div>
        </div>
      </div>
    </div>
    <div class="messages" id="messages" style="display:none"></div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="输入你的问题..." onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div class="overlay" id="uploadOverlay" onclick="if(event.target===this)closeOverlay('uploadOverlay')">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('uploadOverlay')">&times;</button>
    <h3>📁 上传文件入库</h3>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📄</div>
      <p>拖拽文件到此处，或点击选择</p>
      <div class="hint">支持 PDF / Markdown 文件</div>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.md,.markdown" hidden>
    <div class="upload-progress" id="uploadProgress" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>
</div>

<!-- Knowledge Modal -->
<div class="overlay" id="knowledgeOverlay" onclick="if(event.target===this)closeOverlay('knowledgeOverlay')">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('knowledgeOverlay')">&times;</button>
    <h3>📚 已入库课本</h3>
    <div class="knowledge-content" id="knowledgeContent">加载中...</div>
  </div>
</div>

<script>
// === Marked config ===
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, {language:lang}).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

// === State ===
let conversations = {};  // id -> {title, messages:[{role,content,thinking?}]}
let currentConvId = null;
let isStreaming = false;

// === Sidebar ===
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function newChat() {
  const id = Date.now().toString();
  conversations[id] = {title:'新对话', messages:[]};
  currentConvId = id;
  renderChatList();
  renderMessages();
  document.getElementById('msgInput').focus();
}

function switchChat(id) {
  currentConvId = id;
  renderChatList();
  renderMessages();
}

function renderChatList() {
  const list = document.getElementById('chatList');
  const ids = Object.keys(conversations).reverse();
  list.innerHTML = ids.map(id => {
    const c = conversations[id];
    const active = id === currentConvId ? 'active' : '';
    return `<div class="nav-item ${active}" onclick="switchChat('${id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      ${esc(c.title.slice(0,20))}${c.title.length>20?'...':''}
    </div>`;
  }).join('');
}

// === Messages ===
function renderMessages() {
  const welcome = document.getElementById('welcome');
  const msgDiv = document.getElementById('messages');
  const title = document.getElementById('chatTitle');

  if (!currentConvId || !conversations[currentConvId]) {
    welcome.style.display = '';
    msgDiv.style.display = 'none';
    title.textContent = '新对话';
    return;
  }

  const conv = conversations[currentConvId];
  welcome.style.display = 'none';
  msgDiv.style.display = '';
  title.textContent = conv.title;

  msgDiv.innerHTML = conv.messages.map((m, i) => renderMsg(m, i)).join('');
  scrollToBottom();
}

function renderMsg(m, idx) {
  if (m.role === 'user') {
    return `<div class="msg msg-user"><div class="msg-body"><div class="msg-content">${esc(m.content)}</div></div></div>`;
  }
  // AI message
  let thinkingHtml = '';
  if (m.thinking && m.thinking.length > 0) {
    const steps = m.thinking.map(s => {
      let detail = s.detail ? `<div class="step-detail">${esc(s.detail)}</div>` : '';
      let result = s.result ? `<div class="step-result">${esc(s.result)}</div>` : '';
      return `<div class="think-step"><div class="step-icon">⚙️</div><div class="step-info"><div class="step-tool">${esc(s.tool)}</div>${detail}${result}</div></div>`;
    }).join('');
    thinkingHtml = `<div class="thinking-block">
      <div class="thinking-header" onclick="toggleThink(this)">
        <span class="arrow">▶</span>
        <span>思考过程 (${m.thinking.length} 步)</span>
      </div>
      <div class="thinking-body">${steps}</div>
    </div>`;
  }
  const html = m.content ? marked.parse(m.content) : '';
  return `<div class="msg msg-ai"><div class="msg-body">${thinkingHtml}<div class="answer-content">${html}</div></div></div>`;
}

function toggleThink(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => area.scrollTop = area.scrollHeight);
}

// === Chat ===
function quickAsk(q) {
  document.getElementById('msgInput').value = q;
  sendMessage();
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  if (!currentConvId) newChat();

  const conv = conversations[currentConvId];
  conv.messages.push({role:'user', content:text});

  // Update title from first message
  if (conv.messages.length === 1) {
    conv.title = text.slice(0, 30);
    renderChatList();
    document.getElementById('chatTitle').textContent = conv.title;
  }

  // Add AI placeholder
  const aiIdx = conv.messages.length;
  conv.messages.push({role:'ai', content:'', thinking:[]});

  input.value = '';
  input.style.height = 'auto';
  renderMessages();
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text}),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream:true});

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }
          const ai = conv.messages[aiIdx];

          if (eventType === 'thinking') {
            ai.thinking.push({tool: data.tool, detail: data.detail || '', result: ''});
            updateAiMsg(aiIdx, ai);
          } else if (eventType === 'tool_result') {
            if (ai.thinking.length > 0) {
              ai.thinking[ai.thinking.length - 1].result = data.output || '';
              updateAiMsg(aiIdx, ai);
            }
          } else if (eventType === 'token') {
            ai.content += data.text;
            updateAiMsg(aiIdx, ai);
          } else if (eventType === 'done') {
            // no-op
          } else if (eventType === 'error') {
            ai.content += `\n\n❌ 错误: ${data.message}`;
            updateAiMsg(aiIdx, ai);
          }
          eventType = null;
        }
      }
    }
  } catch (e) {
    conv.messages[aiIdx].content = `❌ 请求失败: ${e.message}`;
    updateAiMsg(aiIdx, conv.messages[aiIdx]);
  }

  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function updateAiMsg(idx, m) {
  const msgEls = document.querySelectorAll('#messages .msg-ai');
  // Count AI messages up to this index
  let aiCount = 0;
  const conv = conversations[currentConvId];
  for (let i = 0; i <= idx; i++) {
    if (conv.messages[i].role === 'ai') aiCount++;
  }
  const el = msgEls[aiCount - 1];
  if (!el) return;

  let thinkingHtml = '';
  if (m.thinking && m.thinking.length > 0) {
    const steps = m.thinking.map(s => {
      let detail = s.detail ? `<div class="step-detail">${esc(s.detail)}</div>` : '';
      let result = s.result ? `<div class="step-result">${esc(s.result)}</div>` : '';
      return `<div class="think-step"><div class="step-icon">⚙️</div><div class="step-info"><div class="step-tool">${esc(s.tool)}</div>${detail}${result}</div></div>`;
    }).join('');
    const spinner = m.content ? '' : '<div class="thinking-spinner"></div>';
    const arrow = m.content ? '▶' : '';
    thinkingHtml = `<div class="thinking-block">
      <div class="thinking-header" onclick="toggleThink(this)">
        ${spinner}<span class="arrow">${arrow}</span>
        <span>思考过程 (${m.thinking.length} 步)</span>
      </div>
      <div class="thinking-body${m.content ? '' : ' open'}">${steps}</div>
    </div>`;
  }

  const html = m.content ? marked.parse(m.content) : '';
  const cursor = isStreaming && m.content ? 'typing-cursor' : '';
  el.querySelector('.msg-body').innerHTML = thinkingHtml + `<div class="answer-content ${cursor}">${html}</div>`;
  scrollToBottom();
}

// === Upload ===
function showUpload() {
  document.getElementById('uploadOverlay').classList.add('show');
  document.getElementById('uploadProgress').style.display = 'none';
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('show');
}

// Drag & drop
const uz = document.getElementById('uploadZone');
uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('dragover'); });
uz.addEventListener('dragleave', () => uz.classList.remove('dragover'));
uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('dragover'); if(e.dataTransfer.files.length) doUpload(e.dataTransfer.files[0]); });
document.getElementById('fileInput').addEventListener('change', e => { if(e.target.files.length) doUpload(e.target.files[0]); });

async function doUpload(file) {
  const prog = document.getElementById('uploadProgress');
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  prog.style.display = '';
  fill.style.width = '10%';
  text.textContent = `正在上传 ${file.name}...`;

  const fd = new FormData();
  fd.append('file', file);

  try {
    fill.style.width = '30%';
    text.textContent = 'MinerU 转换中... (如为 PDF)';
    const res = await fetch('/api/upload', {method:'POST', body: fd});
    fill.style.width = '90%';
    text.textContent = '知识库载入中...';
    const data = await res.json();
    fill.style.width = '100%';
    if (data.status === 'ok') {
      text.textContent = `✅ ${data.filename} 上传成功，${data.chunks} 个片段已入库`;
    } else {
      text.textContent = `❌ ${data.message}`;
    }
  } catch (e) {
    fill.style.width = '100%';
    text.textContent = `❌ 上传失败: ${e.message}`;
  }
}

// === Knowledge ===
async function showKnowledge() {
  document.getElementById('knowledgeOverlay').classList.add('show');
  try {
    const res = await fetch('/api/knowledge');
    const data = await res.json();
    document.getElementById('knowledgeContent').textContent = data.content;
  } catch {
    document.getElementById('knowledgeContent').textContent = '加载失败';
  }
}

// === Utils ===
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
newChat();
</script>
